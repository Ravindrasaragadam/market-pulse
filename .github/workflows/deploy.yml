name: Market Pulse Scanner (Serverless)

on:
  schedule:
    - cron: '*/60 * * * *' # Run every 60 minutes
  workflow_dispatch:      # Allow manual trigger from GitHub UI

jobs:
  run-scanner:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python with pip caching
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'
          cache: 'pip'
          cache-dependency-path: '**/requirements.txt'
          
      - name: Install Dependencies
        run: |
          pip install --upgrade pip
          pip install -r platform_backend/requirements.txt
          
      - name: Run Market Pulse Scanner
        timeout-minutes: 30  # Individual step timeout
        env:
          TELEGRAM_API_ID: ${{ secrets.TELEGRAM_API_ID }}
          TELEGRAM_API_HASH: ${{ secrets.TELEGRAM_API_HASH }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_STRING_SESSION: ${{ secrets.TELEGRAM_STRING_SESSION }}
          TELEGRAM_SESSION_NAME: ${{ secrets.TELEGRAM_SESSION_NAME }}
          TELEGRAM_ALERT_CHAT_ID: ${{ secrets.TELEGRAM_ALERT_CHAT_ID }}
          TELEGRAM_ALLOWED_CHATS: ${{ secrets.TELEGRAM_ALLOWED_CHATS }}
          NVIDIA_NIM_API_KEY: ${{ secrets.NVIDIA_NIM_API_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          WATCHLIST_SYMBOLS: ${{ secrets.WATCHLIST_SYMBOLS }}
          FOCUS_KEYWORDS: ${{ secrets.FOCUS_KEYWORDS }}
        run: |
          mkdir -p downloads
          python -m platform_backend.monitor
